<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="Header">
            <h1>Disider</h1>
            <p>Add your options and late fate deside</p>
        </div>
        <div class="main">
            <input type="text" id="mainInputText" placeholder="Enter your options">
            <button id="addButton">+</button>
        </div>
        <div id="choice-container"></div>
        <button id="disiderButton">pick one</button>
        <div id="resultBox">

        <div class="sparkle sparkle1"></div>
        <div class="sparkle sparkle2"></div>
        <div class="sparkle sparkle3"></div>
        <div class="sparkle sparkle4"></div>

        <p class="result-subtitle">
            And the choice is...
        </p>

        <h2 id="resultText">
            Burger
        </h2>

        <button id="clearButton">  <!--i change name from reroll button to clearButton-->
            ⟲
        </button>
    </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
